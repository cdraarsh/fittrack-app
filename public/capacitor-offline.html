<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
      gap: 20px;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #1a1a1a;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    p {
      font-size: 15px;
      color: #888;
      line-height: 1.5;
      max-width: 280px;
    }
    button {
      margin-top: 8px;
      padding: 14px 32px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">&#128170;</div>
  <h1>You're offline</h1>
  <p>FitTrack needs an internet connection. Check your Wi-Fi or cellular and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
